{% extends "base.html" %}

{% block title %}Login - Billing Management System{% endblock %}

{% block content %}
<style>
  .login-bg {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0d6efd, #6610f2, #20c997);
    background-size: 400% 400%;
    animation: gradientShift 18s ease infinite;
    position: relative;
    overflow: hidden;
  }
  .login-bg::before,
  .login-bg::after {
    content: "";
    position: absolute;
    width: 300px;
    height: 300px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 50%;
    filter: blur(2px);
    animation: float 18s infinite alternate;
  }
  .login-bg::before {
    top: -80px;
    left: -80px;
  }
  .login-bg::after {
    bottom: -80px;
    right: -80px;
    animation-delay: 4s;
  }
  .login-card {
    max-width: 420px;
    width: 100%;
    background: rgba(255, 255, 255, 0.14);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-radius: 1.5rem;
    border: 1px solid rgba(255, 255, 255, 0.18);
    box-shadow: 0 20px 40px rgba(15, 23, 42, 0.35);
    animation: cardFadeIn 0.9s ease-out forwards;
    transform: translateY(15px);
    opacity: 0;
  }
  .login-card input.form-control {
    border-radius: 999px;
    border: 1px solid rgba(148, 163, 184, 0.7);
    background-color: rgba(255, 255, 255, 0.8);
    transition: box-shadow 0.2s ease, transform 0.15s ease;
  }
  .login-card input.form-control:focus {
    box-shadow: 0 0 0 0.15rem rgba(13, 110, 253, 0.35);
    transform: translateY(-1px);
  }
  .login-card .btn-primary {
    border-radius: 999px;
    font-weight: 600;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
  }
  .login-card .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 20px rgba(13, 110, 253, 0.45);
  }
  .toggle-password {
    cursor: pointer;
  }
  .spinner-border.spinner-sm {
    display: none;
  }
  .btn-loading .spinner-border.spinner-sm {
    display: inline-block;
  }
  .btn-loading .btn-text {
    opacity: 0.7;
  }
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes cardFadeIn {
    from { opacity: 0; transform: translateY(25px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes float {
    0% { transform: translate(0, 0); }
    100% { transform: translate(40px, -30px); }
  }
</style>

<div class="login-bg">
  <div class="login-card card border-0">
    <div class="card-body p-4 p-lg-5">
      <div class="text-center mb-4">
        <h3 class="fw-bold">Billing Management System</h3>
        <p class="text-muted mb-0">Sign in to your account</p>
      </div>

      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endif %}

      <form method="post" novalidate id="login-form">
        {% csrf_token %}
        <div class="mb-3">
          <label for="id_username" class="form-label">Username</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-person"></i>
            </span>
            <input type="text" name="username" id="id_username" class="form-control rounded-end" required>
          </div>
        </div>

        <div class="mb-3">
          <label for="id_password" class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-lock"></i>
            </span>
            <input type="password" name="password" id="id_password" class="form-control rounded-end" required>
            <span class="input-group-text toggle-password" id="togglePassword">
              <i class="bi bi-eye"></i>
            </span>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label d-block">Login as</label>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="role" id="role_user" value="user" checked>
            <label class="form-check-label" for="role_user">User</label>
          </div>
          <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="role" id="role_admin" value="admin">
            <label class="form-check-label" for="role_admin">Admin</label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-2" id="loginButton">
          <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
          <span class="btn-text">Login</span>
        </button>
      </form>
    </div>
  </div>
</div>

<script>
  (function() {
    const passwordInput = document.getElementById('id_password');
    const togglePassword = document.getElementById('togglePassword');
    const loginForm = document.getElementById('login-form');
    const loginButton = document.getElementById('loginButton');

    if (togglePassword && passwordInput) {
      togglePassword.addEventListener('click', function () {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.querySelector('i').classList.toggle('bi-eye');
        this.querySelector('i').classList.toggle('bi-eye-slash');
      });
    }

    if (loginForm && loginButton) {
      loginForm.addEventListener('submit', function () {
        loginButton.classList.add('btn-loading');
        loginButton.setAttribute('disabled', 'disabled');
      });
    }
  })();
</script>
{% endblock %}
